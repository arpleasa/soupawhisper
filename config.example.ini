# SoupaWhisper Configuration
# Copy to ~/.config/soupawhisper/config.ini

[asr]
# Backend: faster-whisper, qwen-asr, transformers, or auto
backend = faster-whisper

# Model name or shortcut
# Shortcuts: tiny.en, base.en, small.en, medium.en, large-v3 (faster-whisper)
#            qwen-0.6b, qwen-1.7b (qwen-asr)
#            distil-whisper, whisper-turbo (transformers)
# Or use full model names like "Qwen/Qwen3-ASR-1.7B" or "openai/whisper-large-v3"
model = base.en

# Device: cpu, cuda, cuda:0, etc.
device = cpu

# Compute type for faster-whisper: int8 (cpu) or float16 (gpu)
compute_type = int8

# Language hint (optional, leave empty for auto-detection)
# Useful for Qwen ASR: English, Chinese, Japanese, Korean, etc.
language =

# Legacy [whisper] section is still supported for backwards compatibility
# [whisper]
# model = base.en
# device = cpu
# compute_type = int8

[hotkey]
# Key to hold for recording
# Options: f12, scroll_lock, pause, or any single character
key = f12

[behavior]
# Automatically type transcribed text into active window
auto_type = true

# Show desktop notifications
notifications = true
